# =========================================================
# Restaurant Management System - Backend Configuration
# Database: SQL Server / SQL Server Management Studio
# =========================================================

spring.application.name=restaurant-backend
server.port=8080

# SQL Server connection
# Change DB_USERNAME and DB_PASSWORD to match your local SQL Server account.
spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=RestaurantDB;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:YourStrongPassword123}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Do not auto-run schema.sql or data.sql in this setup.
# Run schema.sql and seed.sql manually in SSMS first.
spring.sql.init.mode=never

# Startup DB connection check.
# Keep true for P6-T01 because the completion criterion is DB connection success.
app.database-check.enabled=true

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
